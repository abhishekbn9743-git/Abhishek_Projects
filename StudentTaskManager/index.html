<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>Student Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti"></canvas>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div>
                    <h1 class="app-title">📚 Student Task Manager</h1>
                    <p class="app-subtitle">Organize your study tasks efficiently</p>
                </div>
                <button id="darkModeToggle" class="btn-dark-mode" title="Toggle dark mode">🌙</button>
            </div>
            
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-value" id="totalTasks">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="completedTasks">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="pendingTasks">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </header>

        <div class="task-input-wrapper">
            <input type="text" id="taskInput" class="task-input" placeholder="Enter your study task..." autocomplete="off">
            <button id="addBtn" class="btn-add">
                <span class="btn-icon">+</span>
                <span class="btn-text">Add</span>
            </button>
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search tasks..." autocomplete="off">
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="progressText" class="progress-text">0% Complete</span>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div id="emptyState" class="empty-state">
            <div class="empty-icon">📝</div>
            <p class="empty-text">No tasks yet. Add your first task!</p>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
