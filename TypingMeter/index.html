<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypePulse  Typing Speed Suite</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="glass-card">
        <div class="header-top">
            <h1>TypePulse  Typing Speed Suite</h1>
            <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light theme">🌗</button>
        </div>
        <nav>
            <button id="tab-test" class="tab active">Speed Test</button>
            <button id="tab-checker" class="tab">Speed Checker</button>
            <button id="tab-meter" class="tab">Speedometer</button>
        </nav>
    </header>

    <main>
        <!-- Typing Speed Test -->
        <section id="speed-test" class="module active glass-card">
            <h2>Typing Speed Test</h2>
            <div id="paragraph-container" class="paragraph"></div>
            <textarea id="test-input" placeholder="Click start and begin typing..." disabled></textarea>
            <div class="controls">
                <label for="duration-select">Duration:</label>
                <select id="duration-select">
                    <option value="30">30s</option>
                    <option value="60" selected>60s</option>
                    <option value="120">120s</option>
                </select>
                <button id="start-test">Start</button>
                <button id="restart-test" disabled>Restart</button>
            </div>
            <div id="test-stats" class="stats">
                <span>Time: <span id="time">60</span>s</span>
                <span>WPM: <span id="wpm">0</span></span>
                <span>CPM: <span id="cpm">0</span></span>
                <span>Accuracy: <span id="accuracy">0</span>%</span>
            </div>
            <div class="progress-bar"><div id="time-bar"></div></div>
            <div id="high-score" class="stats">
                <span>High WPM: <span id="hs-wpm">0</span></span>
            </div>
            <div id="result-card" class="result-card hidden glass-card">
                <h3>Results</h3>
                <p>WPM: <span id="res-wpm"></span></p>
                <p>Accuracy: <span id="res-accuracy"></span>%</p>
                <p>Characters Typed: <span id="res-chars"></span></p>
                <p>Mistakes: <span id="res-mistakes"></span></p>
            </div>
        </section>

        <!-- Typing Speed Checker -->
        <section id="speed-checker" class="module glass-card">
            <h2>Typing Speed Checker</h2>
            <textarea id="checker-input" placeholder="Start typing freely..."></textarea>
            <div id="checker-stats" class="stats">
                <span>Keystrokes: <span id="ks-count">0</span></span>
                <span>WPM: <span id="ck-wpm">0</span></span>
                <span>CPM: <span id="ck-cpm">0</span></span>
                <span>Accuracy: <span id="ck-accuracy">0</span>%</span>
            </div>
            <canvas id="speed-chart" height="150"></canvas>
        </section>

        <!-- Live Typing Speedometer -->
        <section id="speedometer-module" class="module glass-card">
            <h2>Live Typing Speedometer</h2>
            <button id="toggle-floating">Enable Floating Typing Speedometer</button>
            <div id="meter-placeholder" class="meter-placeholder">
                <canvas id="meter-canvas" width="200" height="200"></canvas>
                <div id="activity-indicator" class="activity"></div>
            </div>
        </section>
    </main>

    <!-- Floating widget -->
    <div id="floating-widget" class="floating-widget hidden">
        <div class="widget-header">
            <span>WPM: <span id="float-wpm">0</span></span>
            <button id="close-widget">&#10005;</button>
        </div>
        <canvas id="float-meter" width="120" height="120"></canvas>
        <div id="float-activity" class="activity"></div>
    </div>

    <div id="confetti-container"></div>
    <script src="script.js"></script>
</body>
</html>
